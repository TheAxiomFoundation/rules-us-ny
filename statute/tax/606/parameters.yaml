# NY Tax Law Section 606 - Tax Credit Parameters
#
# Parameters for NY tax credits including:
# - NY EITC (Section 606(d)) - 30% of federal EITC
# - Empire State Child Credit (Section 606(c)) - $100/child or 33% of federal CTC
# - Household Credit (Section 606(b)) - Alternative to EITC for higher incomes
#
# Sources:
# - https://www.tax.ny.gov/pit/credits/earned_income_credit.htm
# - https://www.tax.ny.gov/pit/credits/empire_state_child_credit.htm
# - NY Tax Law Section 606: https://www.nysenate.gov/legislation/laws/TAX/606

gov.ny.tax.606:
  # ===========================================================================
  # NY EARNED INCOME CREDIT - Section 606(d)
  # ===========================================================================
  eitc:
    percentage_of_federal:
      description: "New York sets the Earned Income Credit at this percentage of the federal EITC per Tax Law Section 606(d)."
      unit: /1
      period: year
      label: "NY EITC Percentage of Federal"
      reference: "NY Tax Law Section 606(d)"
      values:
        2024-01-01: 0.30
        2025-01-01: 0.30
        2026-01-01: 0.30

  # ===========================================================================
  # EMPIRE STATE CHILD CREDIT - Section 606(c)
  # ===========================================================================
  empire_state_child_credit:
    per_child_amount:
      description: "New York provides a flat credit of this amount per qualifying child per Tax Law Section 606(c)."
      unit: currency-USD
      period: year
      label: "Empire State Child Credit Per Child"
      reference: "NY Tax Law Section 606(c)"
      values:
        2024-01-01: 100
        2025-01-01: 100
        2026-01-01: 100

    federal_ctc_percentage:
      description: "New York sets the alternative Empire State Child Credit at this percentage of the 2017 federal Child Tax Credit."
      unit: /1
      period: year
      label: "Empire State CTC Federal Percentage"
      reference: "NY Tax Law Section 606(c)"
      values:
        2024-01-01: 0.33
        2025-01-01: 0.33
        2026-01-01: 0.33

    max_credit_per_child:
      description: "New York caps the Empire State Child Credit at this amount per qualifying child."
      unit: currency-USD
      period: year
      label: "Empire State CTC Maximum Per Child"
      reference: "NY Tax Law Section 606(c)"
      values:
        2024-01-01: 330
        2025-01-01: 330
        2026-01-01: 330

    # Phase-out thresholds (based on 2017 federal CTC rules)
    phaseout:
      single:
        description: "New York begins phasing out the Empire State Child Credit at this AGI for single filers."
        unit: currency-USD
        period: year
        label: "Empire State CTC Phaseout Single"
        reference: "NY Tax Law Section 606(c)"
        values:
          2024-01-01: 75000
          2025-01-01: 75000
          2026-01-01: 75000

      joint:
        description: "New York begins phasing out the Empire State Child Credit at this AGI for joint filers."
        unit: currency-USD
        period: year
        label: "Empire State CTC Phaseout Joint"
        reference: "NY Tax Law Section 606(c)"
        values:
          2024-01-01: 110000
          2025-01-01: 110000
          2026-01-01: 110000

      head_of_household:
        description: "New York begins phasing out the Empire State Child Credit at this AGI for head of household filers."
        unit: currency-USD
        period: year
        label: "Empire State CTC Phaseout HOH"
        reference: "NY Tax Law Section 606(c)"
        values:
          2024-01-01: 75000
          2025-01-01: 75000
          2026-01-01: 75000

      rate_per_1000:
        description: "New York reduces the Empire State Child Credit by this amount for each one thousand dollars of income above the phaseout threshold."
        unit: currency-USD
        period: year
        label: "Empire State CTC Phaseout Rate"
        reference: "NY Tax Law Section 606(c)"
        values:
          2024-01-01: 16.50
          2025-01-01: 16.50
          2026-01-01: 16.50

    # Child age threshold (uses 2017 federal rules)
    child_age_threshold:
      description: "New York uses the 2017 federal CTC age threshold for qualifying children."
      unit: years
      period: year
      label: "Empire State CTC Child Age Threshold"
      reference: "NY Tax Law Section 606(c)"
      values:
        2024-01-01: 17
        2025-01-01: 17
        2026-01-01: 17

  # ===========================================================================
  # HOUSEHOLD CREDIT - Section 606(b)
  # ===========================================================================
  household_credit:
    single:
      description: "New York provides this household credit amount for single filers per Tax Law Section 606(b)."
      unit: currency-USD
      period: year
      label: "Household Credit Single"
      reference: "NY Tax Law Section 606(b)"
      values:
        2024-01-01: 90
        2025-01-01: 90
        2026-01-01: 90

    married_filing_jointly:
      description: "New York provides this household credit amount for joint filers per Tax Law Section 606(b)."
      unit: currency-USD
      period: year
      label: "Household Credit Joint"
      reference: "NY Tax Law Section 606(b)"
      values:
        2024-01-01: 180
        2025-01-01: 180
        2026-01-01: 180

    head_of_household:
      description: "New York provides this household credit amount for head of household filers per Tax Law Section 606(b)."
      unit: currency-USD
      period: year
      label: "Household Credit HOH"
      reference: "NY Tax Law Section 606(b)"
      values:
        2024-01-01: 130
        2025-01-01: 130
        2026-01-01: 130

    married_filing_separately:
      description: "New York provides this household credit amount for separate filers per Tax Law Section 606(b)."
      unit: currency-USD
      period: year
      label: "Household Credit MFS"
      reference: "NY Tax Law Section 606(b)"
      values:
        2024-01-01: 45
        2025-01-01: 45
        2026-01-01: 45

    income_limits:
      single:
        description: "New York phases out the household credit above this income for single filers per Tax Law Section 606(b)."
        unit: currency-USD
        period: year
        label: "Household Credit Income Limit Single"
        reference: "NY Tax Law Section 606(b)"
        values:
          2024-01-01: 28000
          2025-01-01: 28000
          2026-01-01: 28000

      married_filing_jointly:
        description: "New York phases out the household credit above this income for joint filers per Tax Law Section 606(b)."
        unit: currency-USD
        period: year
        label: "Household Credit Income Limit Joint"
        reference: "NY Tax Law Section 606(b)"
        values:
          2024-01-01: 32000
          2025-01-01: 32000
          2026-01-01: 32000
