# NY Tax Law Section 601 - Personal Income Tax Rates and Brackets
#
# New York imposes a progressive income tax with 9 marginal brackets
# ranging from 4% to 10.9%. Brackets vary by filing status.
#
# For NY AGI > $107,650, taxpayers must use the tax computation
# worksheet rather than the tax tables (supplemental tax calculation).
#
# Sources:
# - NY Tax Law Section 601: https://www.nysenate.gov/legislation/laws/TAX/601
# - 2024 Tax Tables: https://www.tax.ny.gov/pit/file/tax-tables/2024.htm
# - 2025 Tax Tables: https://www.tax.ny.gov/pit/file/tax-tables/2025.htm

