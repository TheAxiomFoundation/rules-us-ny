# NY Tax Law Section 614 - Standard Deduction Parameters
#
# Standard deduction amounts for New York State resident individuals.
# These amounts have been unchanged since tax year 2018.
#
# Source:
# - https://www.tax.ny.gov/pit/file/standard_deductions.htm
# - NY Tax Law Section 614: https://www.nysenate.gov/legislation/laws/TAX/614

gov.ny.tax.614:
  # ===========================================================================
  # STANDARD DEDUCTION AMOUNTS
  # ===========================================================================
  standard_deduction:
    single:
      description: "New York allows single filers to claim this standard deduction per Tax Law Section 614."
      unit: currency-USD
      period: year
      label: "Standard Deduction Single"
      reference: "NY Tax Law Section 614(c)"
      values:
        2024-01-01: 8000
        2025-01-01: 8000
        2026-01-01: 8000

    married_filing_jointly:
      description: "New York allows joint filers to claim this standard deduction per Tax Law Section 614."
      unit: currency-USD
      period: year
      label: "Standard Deduction Joint"
      reference: "NY Tax Law Section 614(a)"
      values:
        2024-01-01: 16050
        2025-01-01: 16050
        2026-01-01: 16050

    head_of_household:
      description: "New York allows head of household filers to claim this standard deduction per Tax Law Section 614."
      unit: currency-USD
      period: year
      label: "Standard Deduction HOH"
      reference: "NY Tax Law Section 614(b)"
      values:
        2024-01-01: 11200
        2025-01-01: 11200
        2026-01-01: 11200

    married_filing_separately:
      description: "New York allows separate filers to claim this standard deduction per Tax Law Section 614."
      unit: currency-USD
      period: year
      label: "Standard Deduction MFS"
      reference: "NY Tax Law Section 614(d)"
      values:
        2024-01-01: 7500
        2025-01-01: 7500
        2026-01-01: 7500

    dependent:
      description: "New York allows dependents to claim this reduced standard deduction per Tax Law Section 614."
      unit: currency-USD
      period: year
      label: "Standard Deduction Dependent"
      reference: "NY Tax Law Section 614"
      values:
        2024-01-01: 3100
        2025-01-01: 3100
        2026-01-01: 3100
