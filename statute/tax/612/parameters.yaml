# NY Tax Law Section 612 - NY AGI Modifications
#
# Section 612 defines modifications to federal AGI to arrive at NY AGI.
# This includes additions (income taxed by NY but not federally) and
# subtractions (income exempt from NY tax but included federally).
#
# Source: https://www.nysenate.gov/legislation/laws/TAX/612
# https://www.tax.ny.gov/pit/file/income.htm

gov.ny.tax.612:
  # ===========================================================================
  # SUBTRACTIONS FROM FEDERAL AGI (Section 612(c))
  # ===========================================================================
  subtractions:
    # Interest on US government obligations
    us_obligations_interest:
      description: "New York subtracts interest on U.S. government obligations from federal AGI per Tax Law Section 612(c)(1)."
      unit: currency-USD
      period: year
      label: "US Government Interest Subtraction"
      reference: "NY Tax Law Section 612(c)(1)"
      values:
        2024-01-01: null  # Actual amount varies by taxpayer

    # Social Security benefits (NY does not tax)
    social_security_exclusion:
      description: "New York excludes Social Security benefits from taxable income per Tax Law Section 612(c)(3-a)."
      unit: rate
      period: year
      label: "Social Security Exclusion Rate"
      reference: "NY Tax Law Section 612(c)(3-a)"
      values:
        2024-01-01: 1.0  # 100% of Social Security is excluded

    # Railroad retirement benefits
    railroad_retirement_exclusion:
      description: "New York excludes railroad retirement benefits from taxable income per Tax Law Section 612(c)(3-b)."
      unit: rate
      period: year
      label: "Railroad Retirement Exclusion Rate"
      reference: "NY Tax Law Section 612(c)(3-b)"
      values:
        2024-01-01: 1.0

    # NY pension and annuity exclusion (up to $20,000 for age 59.5+)
    pension_exclusion:
      amount:
        description: "New York allows taxpayers age 59.5 and older to exclude up to this amount of pension and annuity income per Tax Law Section 612(c)(3)."
        unit: currency-USD
        period: year
        label: "Pension/Annuity Exclusion"
        reference: "NY Tax Law Section 612(c)(3)"
        values:
          2024-01-01: 20000
          2025-01-01: 20000
          2026-01-01: 20000

      age_threshold:
        description: "New York sets the minimum age for the pension exclusion at this value."
        unit: years
        period: year
        label: "Pension Exclusion Age Threshold"
        reference: "NY Tax Law Section 612(c)(3)"
        values:
          2024-01-01: 59.5
          2025-01-01: 59.5
          2026-01-01: 59.5

    # NYS/NYC/local government pension exclusion (full exclusion)
    government_pension_exclusion:
      description: "New York fully excludes pensions from NY state and local government retirement systems."
      unit: rate
      period: year
      label: "Government Pension Exclusion Rate"
      reference: "NY Tax Law Section 612(c)(3)(i)"
      values:
        2024-01-01: 1.0

    # College tuition savings (529 plan) deduction
    college_529_deduction:
      description: "New York allows a subtraction for contributions to NY 529 college savings plans up to this amount."
      unit: currency-USD
      period: year
      label: "529 Plan Contribution Deduction"
      reference: "NY Tax Law Section 612(c)(32)"
      values:
        2024-01-01: 5000
        2025-01-01: 5000
        2026-01-01: 5000

  # ===========================================================================
  # ADDITIONS TO FEDERAL AGI (Section 612(b))
  # ===========================================================================
  additions:
    # Interest on out-of-state municipal bonds
    out_of_state_municipal_interest:
      description: "New York adds interest on municipal bonds from other states to federal AGI per Tax Law Section 612(b)(1)."
      unit: rate
      period: year
      label: "Out-of-State Municipal Interest Addition Rate"
      reference: "NY Tax Law Section 612(b)(1)"
      values:
        2024-01-01: 1.0  # 100% of out-of-state muni interest is added back

    # Taxes based on income paid to other states (for SALT workaround)
    ptet_addback:
      description: "New York adds back pass-through entity tax deducted federally per Tax Law Section 612(b)(43)."
      unit: rate
      period: year
      label: "PTET Addback Rate"
      reference: "NY Tax Law Section 612(b)(43)"
      values:
        2024-01-01: 1.0
