# NYC Administrative Code Section 11-1706 - Tax Credit Parameters
#
# NYC provides additional tax credits for NYC residents:
# - NYC EITC: 5% of federal EITC (formerly 10%, reduced to 5% in 2022)
# - NYC School Tax Credit: $63 single / $125 joint for incomes under $250,000
# - NYC Enhanced Real Property Tax Credit: For homeowners and renters
#
# Sources:
# - https://www.tax.ny.gov/pit/credits/new_york_city_credits.htm
# - NYC Administrative Code Section 11-1706: https://codelibrary.amlegal.com/codes/newyorkcity/latest/NYCadmin

gov.nyc.tax.1706:
  # ===========================================================================
  # NYC EARNED INCOME CREDIT
  # ===========================================================================
  eitc:
    percentage_of_federal:
      description: "New York City sets the Earned Income Credit at this percentage of the federal EITC per Administrative Code Section 11-1706."
      unit: /1
      period: year
      label: "NYC EITC Percentage of Federal"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 0.05
        2025-01-01: 0.05
        2026-01-01: 0.05

  # ===========================================================================
  # NYC SCHOOL TAX CREDIT
  # ===========================================================================
  school_tax_credit:
    single:
      description: "New York City provides this school tax credit for single filers per Administrative Code Section 11-1706."
      unit: currency-USD
      period: year
      label: "NYC School Tax Credit Single"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 63
        2025-01-01: 63
        2026-01-01: 63

    married_filing_jointly:
      description: "New York City provides this school tax credit for joint filers per Administrative Code Section 11-1706."
      unit: currency-USD
      period: year
      label: "NYC School Tax Credit Joint"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 125
        2025-01-01: 125
        2026-01-01: 125

    head_of_household:
      description: "New York City provides this school tax credit for head of household filers per Administrative Code Section 11-1706."
      unit: currency-USD
      period: year
      label: "NYC School Tax Credit HOH"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 63
        2025-01-01: 63
        2026-01-01: 63

    married_filing_separately:
      description: "New York City provides this school tax credit for separate filers per Administrative Code Section 11-1706."
      unit: currency-USD
      period: year
      label: "NYC School Tax Credit MFS"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 63
        2025-01-01: 63
        2026-01-01: 63

    income_limit:
      description: "New York City limits the school tax credit to filers with household income below this amount."
      unit: currency-USD
      period: year
      label: "NYC School Tax Credit Income Limit"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 250000
        2025-01-01: 250000
        2026-01-01: 250000

  # ===========================================================================
  # NYC ENHANCED REAL PROPERTY TAX CREDIT (UBT Credit)
  # For NYC residents who own or rent their primary residence
  # ===========================================================================
  real_property_tax_credit:
    rent_threshold:
      description: "New York City provides the enhanced real property tax credit for renters paying above this annual rent threshold."
      unit: currency-USD
      period: year
      label: "NYC Real Property Tax Credit Rent Threshold"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 450
        2025-01-01: 450
        2026-01-01: 450

    max_credit:
      description: "New York City caps the enhanced real property tax credit at this amount."
      unit: currency-USD
      period: year
      label: "NYC Real Property Tax Credit Maximum"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 500
        2025-01-01: 500
        2026-01-01: 500

    income_limit:
      description: "New York City limits the enhanced real property tax credit to filers with income below this amount."
      unit: currency-USD
      period: year
      label: "NYC Real Property Tax Credit Income Limit"
      reference: "NYC Admin Code Section 11-1706"
      values:
        2024-01-01: 200000
        2025-01-01: 200000
        2026-01-01: 200000
