        period: year
        label: "NYC Single Bracket 3 Threshold"
        reference: "NYC Admin Code Section 11-1701"
        values:
          2024-01-01: 25000
          2025-01-01: 25000
          2026-01-01: 25000

      bracket_4:
        description: "New York City begins the 3.876% bracket at this taxable income for single filers."
