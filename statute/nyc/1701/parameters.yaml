# NYC Administrative Code Section 11-1701 - Income Tax Parameters
#
# NYC income tax bracket thresholds. NYC has a separate personal income tax
# for NYC residents in addition to NYS income tax.
#
# NYC has 4 marginal tax brackets: 3.078%, 3.762%, 3.819%, 3.876%
# These thresholds have been unchanged since 2017.
#
# Sources:
# - https://www.tax.ny.gov/pit/file/tax-tables/2024.htm
# - NYC Administrative Code Section 11-1701: https://codelibrary.amlegal.com/codes/newyorkcity/latest/NYCadmin

gov.nyc.tax.1701:
  # ===========================================================================
  # TAX RATES (Fixed in Administrative Code)
  # ===========================================================================
  rates:
    bracket_1:
      description: "New York City applies this tax rate to the first income bracket per Administrative Code Section 11-1701."
      unit: /1
      period: year
      label: "NYC First Bracket Rate"
      reference: "NYC Admin Code Section 11-1701"
      values:
        2024-01-01: 0.03078
        2025-01-01: 0.03078
        2026-01-01: 0.03078

    bracket_2:
      description: "New York City applies this tax rate to the second income bracket per Administrative Code Section 11-1701."
      unit: /1
      period: year
      label: "NYC Second Bracket Rate"
      reference: "NYC Admin Code Section 11-1701"
      values:
        2024-01-01: 0.03762
        2025-01-01: 0.03762
        2026-01-01: 0.03762

    bracket_3:
      description: "New York City applies this tax rate to the third income bracket per Administrative Code Section 11-1701."
      unit: /1
      period: year
      label: "NYC Third Bracket Rate"
      reference: "NYC Admin Code Section 11-1701"
      values:
        2024-01-01: 0.03819
        2025-01-01: 0.03819
        2026-01-01: 0.03819

    bracket_4:
      description: "New York City applies this top marginal tax rate to higher income per Administrative Code Section 11-1701."
      unit: /1
      period: year
      label: "NYC Top Bracket Rate"
      reference: "NYC Admin Code Section 11-1701"
      values:
        2024-01-01: 0.03876
        2025-01-01: 0.03876
        2026-01-01: 0.03876

  # ===========================================================================
  # BRACKET THRESHOLDS - SINGLE FILERS
