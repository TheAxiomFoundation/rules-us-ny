        description: "New York City begins the 3.762% bracket at this taxable income for single filers."
        unit: currency-USD
        period: year
        label: "NYC Single Bracket 2 Threshold"
        reference: "NYC Admin Code Section 11-1701"
        values:
          2024-01-01: 12000
          2025-01-01: 12000
          2026-01-01: 12000

      bracket_3:
        description: "New York City begins the 3.819% bracket at this taxable income for single filers."
